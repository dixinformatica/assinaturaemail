<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Assinatura de E-mail</title>
    <style>
        /* Estilos da Interface (Não afetam a assinatura) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        h2 {
            color: #1a73e8;
            margin-top: 0;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 800;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
        }

        .preview-box {
            border: 2px dashed #cbd5e0;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            background-color: #fff;
            overflow-x: auto;
        }

        .btn-copy {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-copy:hover {
            background-color: #1557b0;
        }

        .instruction {
            font-size: 13px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerador de Assinatura</h2>
    
    <div class="form-group">
        <label for="inputNome">Nome Completo:</label>
        <input type="text" id="inputNome" placeholder="Digite seu nome e sobrenome" maxlength="40">
    </div>

    <div class="form-group">
        <label for="inputTelefone">Telefone / WhatsApp:</label>
        <input type="text" id="inputTelefone" placeholder="(00) 00000-0000">
    </div>

    <p style="font-weight: bold; color: #444; margin-bottom: 5px;">Pré-visualização:</p>
    <div class="preview-box" id="previewArea">
        
        <!-- INÍCIO DA ESTRUTURA DA ASSINATURA (TABELA) -->
        <table id="assinaturaFinal" cellpadding="0" cellspacing="0" style="font-family: Arial, sans-serif; color: #333; line-height: 1.4;">
            <tr>
                <!-- Logo da Empresa -->
                <td style="padding-right: 20px; vertical-align: middle; border-right: 2px solid #1a73e8;">
                    <!-- SUBSTITUA O LINK ABAIXO PELA SUA LOGO REAL -->
                    <img src="https://via.placeholder.com/120x120?text=LOGO" width="120" alt="Logo Empresa" style="display: block;">
                </td>
                
                <!-- Informações do Usuário -->
                <td style="padding-left: 20px; vertical-align: middle;">
                    <span id="outNome" style="font-size: 18px; font-weight: bold; color: #1a73e8;">Nome do Usuário</span><br>
                    <span style="font-size: 14px; color: #666; font-style: italic;">Técnico em Informática</span><br>
                    
                    <table cellpadding="0" cellspacing="0" style="margin-top: 10px;">
                        <tr>
                            <td style="font-size: 13px; color: #333;">
                                <strong>Fone:</strong> <span id="outTelefone">(00) 00000-0000</span><br>
                                <strong>E-mail:</strong> rafael@dixinformatica.com.br<br>
                                <strong>Site:</strong> www.dixinformatica.com.br
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
        <!-- FIM DA ESTRUTURA DA ASSINATURA -->

    </div>

    <button class="btn-copy" onclick="copiar()">Copiar Assinatura para o E-mail</button>
    <p class="instruction">Após clicar em copiar, vá nas configurações do seu e-mail e dê um "Colar" (Ctrl+V).</p>
</div>

<script>
    const inputNome = document.getElementById('inputNome');
    const inputTelefone = document.getElementById('inputTelefone');
    const outNome = document.getElementById('outNome');
    const outTelefone = document.getElementById('outTelefone');

    // Atualização em Tempo Real
    inputNome.addEventListener('input', function() {
        outNome.innerText = this.value || "Nome do Usuário";
    });

    inputTelefone.addEventListener('input', function() {
        outTelefone.innerText = this.value || "(00) 00000-0000";
    });

    // Função de Cópia Profissional (Mantém formatação e imagens)
    function copiar() {
        const area = document.getElementById('assinaturaFinal');
        
        // Cria uma seleção de texto sobre a tabela
        const range = document.createRange();
        range.selectNode(area);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);

        try {
            // Copia o conteúdo selecionado (Rich Text)
            const copiado = document.execCommand('copy');
            if (copiado) {
                alert('Assinatura copiada! Agora basta colar no seu Outlook, Gmail ou Webmail.');
            }
        } catch (err) {
            alert('Erro ao copiar automaticamente. Por favor, selecione a assinatura com o mouse e copie manualmente.');
        }

        // Limpa a seleção para não ficar azul na tela
        selection.removeAllRanges();
    }
</script>

</body>
</html>
